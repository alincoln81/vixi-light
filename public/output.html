<!DOCTYPE html>
<html lang="en" id="output-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Output</title>
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- UIkit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    
    <!-- MDI Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/uikit_overrides.css">
    
    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>

</head>
<body id="output-body" class="uk-flex uk-flex-center uk-flex-middle">

    <!-- Waiting Screen -->
    <div id="output-waiting-screen" class="uk-text-center uk-flex uk-flex-center uk-flex-middle">
        <div class="waiting-content">
            <div class="waiting-pulse-ring" aria-hidden="true"></div>
            <h1>Waiting for the Game to Start...</h1>
            <p class="waiting-subtext">Scan the QR code to join when polling begins</p>
        </div>
    </div>
    
    <!-- Add a div that is 1920x1080px and vertically and horizontally centered -->
    <div id="output-container" style="display: none;">
        <div id="qr" aria-hidden="true"></div>

        <div id="output-content">
            <div id="question-container" class="uk-text-center uk-flex uk-flex-center uk-flex-middle">
                <div class="question-frame">
                    <h1 id="question-text">Question Goes Here</h1>
                </div>
            </div>

            <div id="output-poll-center">
            <div id="head-to-head" class="layout-text-only" style="display: none;">
                <div id="head-to-head-options" class="uk-grid uk-grid-collapse" uk-grid>
                    <div id="answer-1" class="uk-width-1-2">
                        <div class="head-to-head-option head-to-head-option--left">
                            <div class="answer-image-frame answer-image-frame--left">
                                <div id="answer-image-1" class="answer-image" aria-hidden="true"></div>
                            </div>
                            <div class="answer-text-container">
                                <h3 id="answer-text-1">Answer Text Goes Here</h3>
                            </div>
                        </div>
                    </div>
                    <div id="answer-2" class="uk-width-1-2">
                        <div class="head-to-head-option head-to-head-option--right">
                            <div class="answer-image-frame answer-image-frame--right">
                                <div id="answer-image-2" class="answer-image" aria-hidden="true"></div>
                            </div>
                            <div class="answer-text-container">
                                <h3 id="answer-text-2">Answer Text Goes Here</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tug-of-war-wrapper">
                    <div class="tug-of-war-bar-host">
                        <div id="tug-of-war-bar" class="tug-of-war-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50">
                            <div id="tug-left" class="tug-segment tug-left">
                                <span id="tug-percent-left">50%</span>
                            </div>
                            <div id="tug-divider" class="tug-divider" aria-hidden="true"></div>
                            <div id="tug-right" class="tug-segment tug-right">
                                <span id="tug-percent-right">50%</span>
                            </div>
                        </div>
                        <div class="h2h-vs-badge" aria-hidden="true">VS</div>
                    </div>
                    <p class="question-eyebrow uk-margin-top">Cast Your Vote</p>
                    <p style="display: none;" id="vote-total-label" class="vote-total-label"><span id="vote-total-count">0</span> votes cast</p>
                </div>
            </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="js/output.js"></script>
</body>
</html>
